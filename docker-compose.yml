version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "8000:8000"

  celery:
    build: .
    command: celery -A core worker -l info
    env_file:
      - .env
    depends_on:
      - redis
      - web
